<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mega JN</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🔥 Mega JN</h1>
  <p>Campeonatos de Brawl Stars em um só lugar</p>
</header>

<section class="container">
  <h2>📅 Torneios disponíveis</h2>

  <div class="card">
    <h3>Campeonato 3x3 - Iniciantes</h3>
    <p>Data: 25/04 - 20:00</p>
    <p>Premiação: R$50</p>
    <a href="#">Entrar</a>
  </div>

</section>

<section class="container">
  <h2>➕ Criar torneio</h2>

  <form>
    <input type="text" placeholder="Nome do torneio" required>
    <input type="datetime-local" required>
    <input type="text" placeholder="Formato (3x3, duo...)" required>
    <input type="text" placeholder="Premiação">
    <input type="text" placeholder="Link de inscrição" required>

    <button type="submit">Publicar</button>
  </form>
</section>

<script src="script.js"></script>
</body>
</html>
